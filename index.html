<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Slither N' Slash, a fast arcade snake game with boost controls."
    />
    <title>Slither N' Slash</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <audio id="goodFoodSound" src="./audio/collectcoin.mp3" preload="auto"></audio>
    <audio id="badFoodSound" src="./audio/negative.mp3" preload="auto"></audio>

    <main class="game-shell">
      <div class="mobile-control-bar mobile-action-controls" aria-label="Speed controls" style="display: none;">
        <button class="touch-control-btn" data-touch-control="boost" type="button">Boost</button>
        <button class="touch-control-btn" data-touch-control="slow" type="button">Slow</button>
      </div>

      <section class="game-stage" aria-label="Slither N' Slash arena">
        <div class="touch-zone touch-zone-left" aria-hidden="true"></div>
        <div class="game-canvas-wrapper">
          <canvas width="400" height="400" id="myCanvas"></canvas>
          <button class="play-snake-game-btn" type="button">Start Game</button>
        </div>
        <div class="touch-zone touch-zone-right" aria-hidden="true"></div>
      </section>

      <div class="mobile-control-bar mobile-direction-controls" aria-label="Direction controls" style="display: none;">
        <button class="touch-control-btn" data-touch-control="left" type="button">Left</button>
        <button class="touch-control-btn" data-touch-control="right" type="button">Right</button>
      </div>

      <aside class="snake-game-panel" aria-label="Slither N' Slash game controls">
        <h1 class="game-title">Slither N' Slash</h1>
        <div class="game-feild">
          <h2 class="score">Score: <span id="score">0</span></h2>
        </div>
        <div class="high-score-feild">
          <h2 class="high-score">High Score: <span id="high-score">0</span></h2>
        </div>
        <div class="boost-label">Boost</div>
        <div class="boost-meter" aria-label="Boost meter">
          <div id="boost-meter-fill" class="boost-meter-fill"></div>
        </div>
        <p class="game-note">
          <strong>Desktop:</strong> Hold Left/Right or A/D to turn gradually. Hold Up/W, Shift, or Space to spend boost, then release to recharge it. Down/S brakes.
          <br/>
          <strong>Mobile:</strong> Touch and drag on the right side to steer (joystick). Touch the left side to boost.
        </p>
      </aside>
    </main>

    <script src="./src/main.js" defer></script>
  </body>
</html>
