<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N5WS8C4XSV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-N5WS8C4XSV');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Slither N' Slash, a fast arcade snake game with boost controls."
    />
    <title>Slither N' Slash</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <audio id="goodFoodSound" src="./audio/collectcoin.mp3" preload="auto"></audio>
    <audio id="badFoodSound" src="./audio/negative.mp3" preload="auto"></audio>

    <main class="game-shell">
      <div class="mobile-control-box boost-control-box boost-visual-state" data-mobile-control="boost" aria-label="Boost control">
        <div class="control-box-label">Boost</div>
        <div class="boost-control-gauge">
          <div class="boost-control-core"></div>
        </div>
      </div>

      <section class="game-stage" aria-label="Slither N' Slash arena">
        <canvas width="400" height="400" id="myCanvas"></canvas>
        <button class="play-snake-game-btn" type="button">Start Game</button>
      </section>

      <div class="mobile-control-box joystick-control-box" data-mobile-control="joystick" aria-label="Joystick control">
        <div class="joystick-origin" id="joystick-origin"></div>
        <div class="joystick-handle" id="joystick-handle"></div>
        <div class="control-box-label">Move</div>
      </div>

      <aside class="snake-game-panel" aria-label="Slither N' Slash game controls">
        <h1 class="game-title">Slither N' Slash</h1>
        <div class="game-feild">
          <h2 class="score">Score: <span id="score">0</span></h2>
        </div>
        <div class="high-score-feild">
          <h2 class="high-score">High Score: <span id="high-score">0</span></h2>
        </div>
        <div id="berserker-status" class="berserker-status" role="status" hidden>
          <span class="berserker-status-icon" aria-hidden="true">&#9876;</span>
          <span class="berserker-status-label">Berserker</span>
          <span id="berserker-time">10</span>s
        </div>
        <div class="boost-label">Boost</div>
        <div class="boost-panel-display boost-visual-state" aria-label="Boost charge">
          <div class="boost-control-gauge">
            <div class="boost-control-core"></div>
          </div>
        </div>
        <div class="boost-meter" aria-label="Boost meter">
          <div id="boost-meter-fill" class="boost-meter-fill"></div>
        </div>
      </aside>
    </main>

    <script src="./src/main.js" defer></script>
  </body>
</html>
